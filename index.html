<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uRelocation Navbar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="navbar-wrap">
      <nav class="navbar" aria-label="Main navigation">
        <a href="#" class="brand" aria-label="uRelocation home">
          <img src="photos/logo.svg" alt="uRelocation" />
        </a>

        <p class="brand-copy">One platform meeting all your relocation needs</p>

        <ul class="nav-links">
          <li><a class="active" href="#">Home</a></li>
          <li class="has-dropdown" id="servicesDesktop">
            <button class="nav-btn" type="button" aria-expanded="false" aria-controls="servicesDropdown">
              Services
              <span class="chevron" aria-hidden="true"></span>
            </button>
            <ul class="dropdown" id="servicesDropdown">
              <li><a href="#">Global Talent Visa</a></li>
              <li><a href="#">Post-relocation</a></li>
              <li><a href="#">Settlement in the UK</a></li>
            </ul>
          </li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Contact</a></li>
        </ul>

        <button class="score-btn" type="button">
          <span class="score-icon" aria-hidden="true"></span>
          Take a scoring test
        </button>

        <button class="burger" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu" id="burgerBtn">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
    </div>
  </header>

  <aside class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <button class="close-menu" type="button" aria-label="Close menu" id="closeBtn"></button>

    <ul class="mobile-links">
      <li><a href="#">Home</a></li>
      <li class="mobile-dropdown" id="servicesMobile">
        <button class="mobile-services-btn" type="button" aria-expanded="true">
          Services
          <span class="chevron" aria-hidden="true"></span>
        </button>
        <ul class="mobile-submenu">
          <li><a href="#">Global Talent Visa</a></li>
          <li><a href="#">Post-relocation</a></li>
          <li><a href="#">Settlement in the UK</a></li>
        </ul>
      </li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </aside>

  <div class="menu-overlay" id="menuOverlay"></div>

  <script>
    (function () {
      const servicesDesktop = document.getElementById('servicesDesktop');
      const desktopBtn = servicesDesktop.querySelector('.nav-btn');

      desktopBtn.addEventListener('click', function () {
        const isOpen = servicesDesktop.classList.toggle('open');
        desktopBtn.setAttribute('aria-expanded', String(isOpen));
      });

      document.addEventListener('click', function (e) {
        if (!servicesDesktop.contains(e.target)) {
          servicesDesktop.classList.remove('open');
          desktopBtn.setAttribute('aria-expanded', 'false');
        }
      });

      const burgerBtn = document.getElementById('burgerBtn');
      const closeBtn = document.getElementById('closeBtn');
      const mobileMenu = document.getElementById('mobileMenu');
      const menuOverlay = document.getElementById('menuOverlay');
      const servicesMobile = document.getElementById('servicesMobile');
      const mobileServicesBtn = servicesMobile.querySelector('.mobile-services-btn');

      function openMenu() {
        mobileMenu.classList.add('open');
        menuOverlay.classList.add('show');
        document.body.classList.add('menu-open');
        burgerBtn.setAttribute('aria-expanded', 'true');
        mobileMenu.setAttribute('aria-hidden', 'false');
      }

      function closeMenu() {
        mobileMenu.classList.remove('open');
        menuOverlay.classList.remove('show');
        document.body.classList.remove('menu-open');
        burgerBtn.setAttribute('aria-expanded', 'false');
        mobileMenu.setAttribute('aria-hidden', 'true');
      }

      burgerBtn.addEventListener('click', openMenu);
      closeBtn.addEventListener('click', closeMenu);
      menuOverlay.addEventListener('click', closeMenu);

      mobileServicesBtn.addEventListener('click', function () {
        const isOpen = servicesMobile.classList.toggle('open');
        mobileServicesBtn.setAttribute('aria-expanded', String(isOpen));
      });

      window.addEventListener('resize', function () {
        if (window.innerWidth > 900) {
          closeMenu();
        }
      });
    })();
  </script>
</body>
</html>
